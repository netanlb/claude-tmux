# claude-tmux: tmux bindings for the Claude-aware session picker.
# Sourced from your ~/.tmux.conf by the installer.
#
# Layout:
#   prefix + s   native tmux choose-tree, sessions only, with an aggregated
#                colored dot (red/yellow/green) reflecting @claude_status
#                across all windows in each session.
#   prefix + F   fzf-based popup with the same dots, plus sorting, an
#                age column, and search/nav modes. See ~/.tmux/claude-session-picker.sh.

# Native picker
bind s choose-tree -ZsN -f "#{?session_format,1,0}" -F "#{?session_format,#{?#{W:#{?@claude_status,Y,}},#[fg=#{?#{W:#{?#{==:#{@claude_status},waiting},Y,}},red,#{?#{W:#{?#{==:#{@claude_status},thinking},Y,}},yellow,green}}]●#[default], },}"

# fzf popup. Resize via -h / -w.
bind F display-popup -E -h 50% -w 50% -B "bash ~/.tmux/claude-session-picker.sh"
